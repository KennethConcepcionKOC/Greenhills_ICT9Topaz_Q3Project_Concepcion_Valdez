       <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

       <form id="registrationForm" method="POST" action="#">
          
           <h4 style="margin-bottom:20px;">Registration</h4>






           <div class="row">
               <div class="col-md-6 mb-3">
                   <label for="firstName" class="form-label">First Name</label>
                   <input type="text" class="form-control" id="firstName" name="firstName" placeholder="First Name" required>
               </div>


               <div class="col-md-6 mb-3">
                   <label for="lastName" class="form-label">Last Name</label>
                   <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Last Name" required>
               </div>
           </div>


           <div class="row">
               <div class="col-md-6 mb-3">
                   <label for="age" class="form-label">Age</label>
                   <input type="number" class="form-control" id="age" name="age" placeholder="Age" required>
               </div>


               <div class="col-md-6 mb-3">
                   <label for="phone" class="form-label">Phone Number</label>
                   <input type="tel" class="form-control" id="phone" name="phone" placeholder="0000-000-0000" required>
               </div>
           </div>


           <div class="row">
               <div class="col-md-6 mb-3">
                   <label for="email" class="form-label">Email Address</label>
                   <input type="email" class="form-control" id="email" name="email" placeholder="example@example.com" required>
               </div>


               <div class="col-md-6 mb-3">
                   <label for="username" class="form-label">Username</label>
                   <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
               </div>
           </div>


           <div class="row">
               <div class="col-md-6 mb-3">
                   <label for="password" class="form-label">Password</label>
                   <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
               </div>


               <div class="col-md-6 mb-3">
                   <label for="pfpInput" class="form-label">Profile Picture</label>
                       <div class="pfp-uploader" id="pfpUploader">
                           <img id="pfpPreview" alt="profile preview" />
                           <input id="pfpInput" type="file" accept="image/*" />
                           <label for="pfpInput" id="pfpLabel">Choose</label>
                       </div>
               </div>
           </div>


           <div class="row">
               <div class="col-md-12 mb-3">
                   <div class="form-check">
                       <input type="checkbox" class="form-check-input" id="confirm" name="confirmation">
                       <label class="form-check-label" for="confirm">I confirm that the information provided is true and complete.</label>
                   </div>
               </div>
           </div>


           <div class="d-grid gap-2">
            <form class="d-flex ms-auto">
                <input type="text" class="form-control me-2" placeholder="Search" style="width: 150px;">
                <a href="page3.html" class="btn btn-primary" style="color:#0c2d55;">
                    Create Account
                </a>
               </form>
           </div>


       </form>

<style>
   .pfp-uploader {
       display: flex;
       flex-direction: column;
       align-items: center;
       gap: 10px;
   }
  
   #pfpPreview {
       width: 150px;
       height: 150px;
       object-fit: cover;
       border-radius: 8px;
       border: 2px solid #ddd;
       display: none;
   }
  
   #pfpPreview.visible {
       display: block;
   }
  
   #pfpInput {
       display: none;
   }
  
   #pfpLabel {
       padding: 8px 16px;
       background-color: #007bff;
       color: white;
       border-radius: 4px;
       cursor: pointer;
       transition: background-color 0.3s;
   }
  
   #pfpLabel:hover {
       background-color: #0056b3;
   }
</style>


<script>
   document.getElementById('pfpInput').addEventListener('change', function(e) {
       const file = e.target.files[0];
       if (file) {
           const reader = new FileReader();
           reader.onload = function(event) {
               const preview = document.getElementById('pfpPreview');
               preview.src = event.target.result;
               preview.classList.add('visible');
           };
           reader.readAsDataURL(file);
       }
   });
  
   document.getElementById('registrationForm').addEventListener('submit', function(e) {
       e.preventDefault();
       const firstName = document.getElementById('firstName').value;
       const lastName = document.getElementById('lastName').value;
       const email = document.getElementById('email').value;
       alert('Account made\n\nName: ' + firstName + ' ' + lastName + '\nEmail: ' + email);
       this.reset();
       document.getElementById('pfpPreview').classList.remove('visible');
   });
</script>
